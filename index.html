<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsStation Server Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
        .active-tab { background-color: #4f46e5 !important; color: white !important; }
        .error-card { background: #fff1f2; border: 1px solid #fda4af; color: #991b1b; padding: 1rem; border-radius: 1rem; font-size: 0.8rem; margin-top: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-4 border-b border-gray-100">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-xl font-black mb-4">🎙️ NewsStation <span class="text-indigo-600">Online</span></h1>
            <div id="tabs" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        <div id="status-area"></div>
        <div id="loading" class="hidden text-center py-20">
            <div class="animate-spin w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p id="loadingText" class="text-gray-500 font-bold">通信中...</p>
        </div>
        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        let allEpisodes = [];

        // 1. JSON読み込み (相対パス指定)
        async function initApp() {
            try {
                const res = await fetch('./podcasts.json');
                if (!res.ok) throw new Error(`podcasts.jsonが見つかりません (Status: ${res.status})`);
                const podcasts = await res.json();
                
                const tabs = document.getElementById('tabs');
                podcasts.forEach((pod, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "whitespace-nowrap px-5 py-2 rounded-2xl bg-gray-100 text-sm font-bold transition-all hover:bg-gray-200";
                    btn.innerText = pod.name;
                    btn.onclick = () => loadPodcast(pod.id, btn);
                    tabs.appendChild(btn);
                    if (idx === 0) loadPodcast(pod.id, btn);
                });
            } catch (e) {
                showError("初期設定エラー", e.message);
            }
        }

        // 2. データ取得 (iTunes -> RSS)
        async function loadPodcast(id, btn) {
            document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');

            const content = document.getElementById('content');
            const loading = document.getElementById('loading');
            const statusArea = document.getElementById('status-area');
            
            content.innerHTML = '';
            statusArea.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                // Step 1: iTunes API
                const itunesUrl = `https://itunes.apple.com/lookup?id=${id}&country=jp`;
                const itunesRes = await fetch(itunesUrl).catch(() => { throw new Error("iTunes APIへの接続に失敗しました（CORS制限の可能性）") });
                const itunesData = await itunesRes.json();
                
                if (!itunesData.results || itunesData.results.length === 0) throw new Error("番組情報が見つかりません");
                const feedUrl = itunesData.results[0].feedUrl;

                // Step 2: RSS取得 (rss2jsonを使用)
                // 混雑回避のため、毎回ユニークなクエリを付与
                const rssApiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&nocache=${Date.now()}`;
                const rssRes = await fetch(rssApiUrl);
                const data = await rssRes.json();

                if (data.status !== 'ok') throw new Error(`ニュース取得失敗: ${data.message}`);

                allEpisodes = data.items.map(item => ({
                    id: item.guid || item.link,
                    title: item.title,
                    date: new Date(item.pubDate).toLocaleDateString('ja-JP'),
                    audio: item.enclosure.link,
                    image: data.feed.image || itunesData.results[0].artworkUrl100,
                    desc: item.description.replace(/<[^>]*>?/gm, '').slice(0, 150)
                }));

                loading.classList.add('hidden');
                render();
            } catch (e) {
                loading.classList.add('hidden');
                showError("データ取得エラー", e.message);
            }
        }

        function render() {
            const content = document.getElementById('content');
            content.innerHTML = allEpisodes.map(ep => `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col gap-4 transition-transform hover:scale-[1.02]">
                    <div class="flex gap-4">
                        <img src="${ep.image}" class="w-14 h-14 rounded-2xl shadow-inner">
                        <div class="flex-1">
                            <p class="text-[10px] text-indigo-500 font-black">${ep.date}</p>
                            <h3 class="text-sm font-bold leading-tight line-clamp-2">${ep.title}</h3>
                        </div>
                    </div>
                    <audio src="${ep.audio}" controls class="w-full h-9"></audio>
                    <p class="text-[11px] text-gray-400 line-clamp-2">${ep.desc}...</p>
                </div>
            `).join('');
        }

        function showError(title, msg) {
            const statusArea = document.getElementById('status-area');
            statusArea.innerHTML = `
                <div class="error-card">
                    <strong>⚠️ ${title}</strong><br>
                    ${msg}<br><br>
                    <small>ヒント: ブラウザの「デベロッパーツール(F12)」のConsoleに赤い文字が出ていないか確認してください。</small>
                </div>
            `;
        }

        initApp();
    </script>
</body>
</html>
