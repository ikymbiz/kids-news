<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsStation List View - Unbreakable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .active-tab { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 12px rgba(79,70,229,0.3); transform: translateY(-1px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .episode-row:hover { background-color: #f8fafc; }
        .highlight { background-color: #fef08a; color: #1e293b; padding: 0 2px; border-radius: 2px; font-weight: bold; }
        #dict-popup { display: none; position: fixed; bottom: 20px; right: 20px; width: 320px; z-index: 1000; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-gray-200">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-xl font-black tracking-tighter text-gray-800">🎙️ NewsStation <span class="text-indigo-600">Free</span></h1>
                <div class="relative w-1/2 md:w-64">
                    <input type="text" id="searchInput" placeholder="タイトルや内容を検索..." 
                           class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <span class="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
                </div>
            </div>
            <div id="tabs" class="flex gap-2 overflow-x-auto no-scrollbar pb-1"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <div id="loading" class="hidden text-center py-20 text-gray-400">
            <div class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p id="loadingText" class="font-bold">ニュースを取得中...</p>
            <p id="proxyStatus" class="text-xs text-gray-400 mt-2"></p>
        </div>
        
        <div id="content" class="space-y-3"></div>
    </main>

    <div id="dict-popup" class="bg-white shadow-2xl rounded-3xl p-6 border border-indigo-50 border-t-4 border-t-indigo-500">
        <div class="flex justify-between items-center mb-4">
            <h4 class="font-bold text-indigo-600 text-xs tracking-widest uppercase">Research Word</h4>
            <button onclick="document.getElementById('dict-popup').style.display='none'" class="text-gray-400 hover:text-gray-600 text-lg">&times;</button>
        </div>
        <div id="dict-result"></div>
    </div>

    <script>
        let allEpisodes = [];
        let currentSearch = "";

        async function initApp() {
            try {
                const res = await fetch('./podcasts.json');
                const podcasts = await res.json();
                const tabs = document.getElementById('tabs');

                podcasts.forEach((pod, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "whitespace-nowrap px-6 py-2 rounded-xl bg-white text-gray-500 text-sm font-bold shadow-sm transition-all border border-gray-100 hover:bg-gray-50";
                    btn.innerText = pod.name;
                    btn.onclick = () => loadPodcast(pod.id, btn);
                    tabs.appendChild(btn);
                    if (idx === 0) loadPodcast(pod.id, btn);
                });
            } catch (e) { 
                document.getElementById('content').innerHTML = `<p class="text-center text-red-500 py-10">設定エラー: podcasts.jsonが見つかりません</p>`; 
            }
        }

        async function loadPodcast(id, btn) {
            document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');

            const content = document.getElementById('content');
            const loading = document.getElementById('loading');
            const proxyStatus = document.getElementById('proxyStatus');
            content.innerHTML = '';
            loading.classList.remove('hidden');
            proxyStatus.innerText = "番組情報を検索中...";

            try {
                // 1. iTunes APIから生のRSSのURLを取得
                const itunesRes = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=jp`);
                const itunesData = await itunesRes.json();
                const feedUrl = itunesData.results[0].feedUrl;
                const artwork = itunesData.results[0].artworkUrl100;

                // 2. 複数の無料中継サーバー（Proxies）をリストアップ
                const proxies = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(feedUrl)}`, // 第1候補
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(feedUrl)}`, // 第2候補
                    `https://corsproxy.io/?${encodeURIComponent(feedUrl)}` // 第3候補
                ];

                let xmlText = "";

                // 3. 生きているサーバーが見つかるまで順番にアタック（フェイルオーバー）
                for (let i = 0; i < proxies.length; i++) {
                    proxyStatus.innerText = `サーバー ${i+1}/${proxies.length} に接続中...`;
                    try {
                        const res = await fetch(proxies[i]);
                        const text = await res.text();
                        
                        // "Oops..." のようなエラー文字ではなく、ちゃんとRSSのデータが返ってきているかチェック
                        if (text.includes('<rss') || text.includes('<feed')) {
                            xmlText = text;
                            break; // 成功したらループを抜ける
                        }
                    } catch (e) {
                        console.warn(`Proxy ${i+1} failed.`);
                    }
                }

                // 全滅した場合のエラー処理
                if (!xmlText) throw new Error("全ての中継サーバーが混雑しています。数分後にもう一度試してください。");

                // 4. 無事に取得できたXMLをブラウザで解析
                proxyStatus.innerText = "データを解析中...";
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                // 50件取得
                allEpisodes = Array.from(items).slice(0, 50).map(item => {
                    const title = item.querySelector("title")?.textContent || "タイトルなし";
                    const pubDateStr = item.querySelector("pubDate")?.textContent;
                    const date = pubDateStr ? new Date(pubDateStr).toLocaleDateString('ja-JP') : "";
                    const audio = item.querySelector("enclosure")?.getAttribute("url") || "";
                    const descRaw = item.querySelector("description")?.textContent || "";
                    const desc = descRaw.replace(/<[^>]*>?/gm, '').slice(0, 150);
                    const epId = item.querySelector("guid")?.textContent || title;

                    return { id: epId, title, date, audio, image: artwork, desc };
                });

                loading.classList.add('hidden');
                render();
            } catch (e) {
                loading.classList.add('hidden');
                content.innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-6 rounded-2xl text-center">
                        <strong class="text-red-600 text-sm">⚠️ 取得エラー</strong>
                        <p class="text-red-400 text-xs mt-2">${e.message}</p>
                        <button onclick="loadPodcast('${id}', document.querySelector('.active-tab'))" class="mt-4 px-4 py-2 bg-white border border-red-200 text-red-500 rounded-xl text-xs font-bold hover:bg-red-50 transition-all">再読み込み</button>
                    </div>`;
            }
        }

        function render() {
            const content = document.getElementById('content');
            const filtered = allEpisodes.filter(ep => 
                ep.title.toLowerCase().includes(currentSearch.toLowerCase()) || 
                ep.desc.toLowerCase().includes(currentSearch.toLowerCase())
            );

            if (filtered.length === 0) {
                content.innerHTML = `<p class="text-center text-gray-400 py-20 font-bold">一致するニュースはありません 🕵️‍♂️</p>`;
                return;
            }

            content.innerHTML = filtered.map(ep => {
                let displayTitle = ep.title;
                if (currentSearch) {
                    const reg = new RegExp(`(${currentSearch})`, "gi");
                    displayTitle = ep.title.replace(reg, '<span class="highlight">$1</span>');
                }

                return `
                <div class="episode-row bg-white p-4 rounded-[1.5rem] border border-gray-100 flex flex-col md:flex-row gap-4 items-center transition-all shadow-sm">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <img src="${ep.image}" class="w-16 h-16 rounded-xl shadow-sm object-cover">
                        <div class="md:hidden flex-1">
                             <p class="text-[10px] text-indigo-500 font-black mb-1 uppercase">${ep.date}</p>
                             <h3 class="text-sm font-bold text-gray-800 leading-tight">${displayTitle}</h3>
                        </div>
                    </div>

                    <div class="flex-1 w-full">
                        <div class="hidden md:block mb-1">
                             <span class="text-[10px] text-indigo-400 font-bold mr-2 bg-indigo-50 px-2 py-1 rounded-md">${ep.date}</span>
                             <h3 class="text-sm font-bold text-gray-800 inline leading-relaxed">${displayTitle}</h3>
                        </div>
                        <audio src="${ep.audio}" controls class="w-full h-8 mt-2 opacity-90 hover:opacity-100 transition-opacity"></audio>
                    </div>

                    <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                        <button onclick="lookupSelection()" class="flex-1 md:flex-none px-5 py-2.5 bg-indigo-50 text-indigo-600 rounded-xl text-[11px] font-bold hover:bg-indigo-100 transition-colors">🔍 調べる</button>
                        <button onclick="addMemo('${ep.id}')" class="flex-1 md:flex-none px-5 py-2.5 bg-gray-50 text-gray-600 rounded-xl text-[11px] font-bold hover:bg-gray-100 transition-colors">📝 メモ</button>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        function lookupSelection() {
            const sel = window.getSelection().toString().trim();
            if (!sel) { alert("調べたい言葉をマウスで選択（ハイライト）してからボタンを押してください！"); return; }
            
            const popup = document.getElementById('dict-popup');
            popup.style.display = 'block';
            document.getElementById('dict-result').innerHTML = `
                <p class="text-lg font-black text-gray-800 mb-4 border-l-4 border-indigo-500 pl-3">${sel}</p>
                <div class="space-y-2">
                    <a href="https://kotobank.jp/word/${encodeURIComponent(sel)}" target="_blank" class="block p-3 bg-gray-50 rounded-xl text-xs font-bold hover:bg-indigo-50 transition-all border border-transparent hover:border-indigo-100 text-gray-700">📚 コトバンクで意味を確認</a>
                    <a href="https://www.google.com/search?q=${encodeURIComponent(sel)}+とは+わかりやすく" target="_blank" class="block p-3 bg-gray-50 rounded-xl text-xs font-bold hover:bg-indigo-50 transition-all border border-transparent hover:border-indigo-100 text-gray-700">🔍 Googleで易しい解説を探す</a>
                </div>
            `;
        }

        function addMemo(id) {
            const existing = localStorage.getItem(`memo_${id}`) || "";
            const memo = prompt("学習メモを入力：\n(保存されたメモはブラウザ内に蓄積されます)", existing);
            if (memo !== null) {
                localStorage.setItem(`memo_${id}`, memo);
                alert("保存しました。");
            }
        }

        initApp();
    </script>
</body>
</html>
