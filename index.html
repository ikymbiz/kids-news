<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsStation Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .active-tab { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .time-link { color: #4f46e5; font-weight: bold; cursor: pointer; text-decoration: underline; }
        #dict-popup { display: none; position: fixed; bottom: 20px; right: 20px; width: 320px; z-index: 1000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .transcript-area { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .transcript-area.open { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body class="pb-20">

    <header class="glass-header sticky top-0 z-50 px-4 py-4 mb-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🎙️</span>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">NewsStation <span class="text-indigo-500">Ultimate</span></h1>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="タイトル検索..." class="flex-1 md:w-64 px-4 py-2 bg-gray-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500">
                <select id="speedMaster" class="bg-gray-100 border-none rounded-2xl px-3 py-2 text-sm font-bold text-indigo-600 outline-none">
                    <option value="0.8">0.8x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.2">1.2x</option>
                    <option value="1.5">1.5x</option>
                </select>
            </div>
        </div>
        <div id="tabs" class="max-w-6xl mx-auto flex gap-2 overflow-x-auto py-4 no-scrollbar"></div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <div id="loading" class="hidden text-center py-20 text-gray-400">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p>最新情報を取得中...</p>
        </div>
        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="dict-popup" class="bg-white shadow-2xl rounded-3xl p-6 border border-indigo-50">
        <div class="flex justify-between items-center mb-4">
            <h4 class="font-bold text-indigo-600 text-sm">📖 用語調査</h4>
            <button onclick="document.getElementById('dict-popup').style.display='none'" class="text-gray-400">&times;</button>
        </div>
        <div id="dict-result" class="space-y-3 text-sm"></div>
    </div>

    <script>
        let allEpisodes = [];
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;

        async function initApp() {
            try {
                const response = await fetch('podcasts.json');
                const podcasts = await response.json();
                const tabsContainer = document.getElementById('tabs');

                podcasts.forEach((pod, index) => {
                    const btn = document.createElement('button');
                    btn.className = "whitespace-nowrap px-6 py-2 rounded-2xl bg-white text-gray-600 text-sm font-bold shadow-sm border border-transparent hover:bg-gray-50 transition-all";
                    btn.innerText = pod.name;
                    btn.onclick = () => loadPodcast(pod.id, btn);
                    tabsContainer.appendChild(btn);
                    if (index === 0) loadPodcast(pod.id, btn);
                });
            } catch (e) { alert("podcasts.jsonが見つかりません。サーバー経由(Live Server等)で実行してください。"); }
        }

        async function loadPodcast(id, selectedBtn) {
            document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active-tab'));
            selectedBtn.classList.add('active-tab');
            const contentArea = document.getElementById('content');
            const loading = document.getElementById('loading');
            contentArea.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                const itunesRes = await fetch(`https://itunes.apple.com/lookup?id=${id}&country=jp`);
                const itunesData = await itunesRes.json();
                const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(itunesData.results[0].feedUrl)}&count=20`);
                const data = await rssRes.json();

                allEpisodes = data.items.map(item => ({
                    id: item.guid || item.link,
                    title: item.title,
                    date: new Date(item.pubDate).toLocaleDateString('ja-JP'),
                    audio: item.enclosure.link,
                    image: data.feed.image,
                    description: item.description // これが「文字起こし代わり」のテキスト
                }));
                loading.classList.add('hidden');
                displayEpisodes(allEpisodes);
            } catch (e) { loading.classList.add('hidden'); contentArea.innerHTML = 'データの取得に失敗しました。'; }
        }

        function displayEpisodes(episodes) {
            const contentArea = document.getElementById('content');
            const speed = document.getElementById('speedMaster').value;
            contentArea.innerHTML = episodes.map(ep => {
                const memo = localStorage.getItem(`memo_${ep.id}`) || '';
                return `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col gap-4">
                    <div class="flex items-start gap-4">
                        <img src="${ep.image}" class="w-14 h-14 rounded-2xl shadow-sm">
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-indigo-400 uppercase tracking-wider">${ep.date}</span>
                            <h3 class="font-bold text-gray-800 text-sm leading-snug line-clamp-2 mt-1">${ep.title}</h3>
                        </div>
                    </div>
                    
                    <audio id="audio_${ep.id}" controls class="w-full h-10 rounded-full" onplay="this.playbackRate=${speed}">
                        <source src="${ep.audio}">
                    </audio>

                    <div class="flex gap-2">
                        <button onclick="addTimestamp('${ep.id}')" class="flex-1 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-bold hover:bg-indigo-100">📌 タイムスタンプ</button>
                        <button onclick="toggleTranscript('${ep.id}')" class="flex-1 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-bold hover:bg-emerald-100">📄 概要/テキスト</button>
                    </div>

                    <div id="transcript_${ep.id}" class="transcript-area bg-gray-50 rounded-2xl text-[11px] text-gray-500 leading-relaxed px-4">
                        <div class="py-4">${ep.description}</div>
                    </div>

                    <div class="bg-indigo-900/5 rounded-3xl p-4 border border-indigo-100">
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-black text-indigo-400 uppercase">Self Memo & Dictation</span>
                            <div class="flex gap-3">
                                <button onclick="startDictation('${ep.id}')" class="text-[9px] font-bold text-red-500 hover:scale-110 transition-transform">🎤 音声でメモ</button>
                                <button onclick="lookupWord()" class="text-[9px] font-bold text-indigo-500 hover:underline">🔍 選択単語を調査</button>
                            </div>
                        </div>
                        <div id="memo_display_${ep.id}" class="text-xs text-gray-600 min-h-[60px] whitespace-pre-wrap leading-relaxed cursor-text" onclick="editMemo('${ep.id}')">${formatMemo(memo, ep.id)}</div>
                        <textarea id="memo_input_${ep.id}" class="hidden w-full bg-transparent text-xs outline-none min-h-[80px] text-gray-600" onblur="saveMemo('${ep.id}')">${memo}</textarea>
                    </div>
                </div>`;
            }).join('');
        }

        function formatMemo(text, id) {
            if (!text) return 'ここをタップしてメモ、または🎤で音声をテキスト化...';
            return text.replace(/(\d{1,2}:\d{2})/g, `<span class="time-link" onclick="jumpTo('${id}', '$1', event)">$1</span>`);
        }

        function toggleTranscript(id) {
            document.getElementById(`transcript_${id}`).classList.toggle('open');
        }

        function startDictation(id) {
            recognition.start();
            const btn = event.target;
            btn.innerText = "Listening...";
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const current = localStorage.getItem(`memo_${id}`) || '';
                localStorage.setItem(`memo_${id}`, current + (current ? '\n' : '') + transcript);
                displayEpisodes(allEpisodes);
            };
            recognition.onend = () => { btn.innerText = "🎤 音声でメモ"; };
        }

        function jumpTo(id, timeStr, event) {
            event.stopPropagation();
            const [m, s] = timeStr.split(':').map(Number);
            const audio = document.getElementById(`audio_${id}`);
            audio.currentTime = m * 60 + s;
            audio.play();
        }

        function addTimestamp(id) {
            const audio = document.getElementById(`audio_${id}`);
            const timeStr = `${String(Math.floor(audio.currentTime/60)).padStart(2,'0')}:${String(Math.floor(audio.currentTime%60)).padStart(2,'0')}`;
            const current = localStorage.getItem(`memo_${id}`) || '';
            localStorage.setItem(`memo_${id}`, current + (current ? '\n' : '') + timeStr + ' ');
            displayEpisodes(allEpisodes);
        }

        function editMemo(id) {
            document.getElementById(`memo_display_${id}`).classList.add('hidden');
            const input = document.getElementById(`memo_input_${id}`);
            input.classList.remove('hidden');
            input.focus();
        }

        function saveMemo(id) {
            localStorage.setItem(`memo_${id}`, document.getElementById(`memo_input_${id}`).value);
            displayEpisodes(allEpisodes);
        }

        function lookupWord() {
            const sel = window.getSelection().toString().trim();
            if (!sel) return;
            document.getElementById('dict-popup').style.display = 'block';
            document.getElementById('dict-result').innerHTML = `
                <p class="font-black text-xl text-gray-800 mb-4 border-l-4 border-indigo-500 pl-3">${sel}</p>
                <div class="flex flex-col gap-2">
                    <a href="https://kotobank.jp/word/${encodeURIComponent(sel)}" target="_blank" class="block w-full p-3 bg-gray-50 rounded-xl text-xs font-bold hover:bg-indigo-50 transition-all border border-transparent hover:border-indigo-100">📚 コトバンクで検索</a>
                    <a href="https://www.google.com/search?q=${encodeURIComponent(sel)}+とは+わかりやすく" target="_blank" class="block w-full p-3 bg-gray-50 rounded-xl text-xs font-bold hover:bg-indigo-50 transition-all border border-transparent hover:border-indigo-100">🔍 Googleでわかりやすく</a>
                </div>
            `;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase();
            displayEpisodes(allEpisodes.filter(ep => ep.title.toLowerCase().includes(kw)));
        });

        initApp();
    </script>
</body>
</html>
